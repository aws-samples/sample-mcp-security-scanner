# =============================================================================
# Project Security Context
# =============================================================================
#
# This file provides project-specific context for the SECURITY.md report
# generated by MCP Security Scanner. It is automatically loaded when
# generating reports — no need to pass parameters manually.
#
# Location: .security/config.yaml (committed to the repo)
#
# Sections:
#   project             — Project metadata
#   assumptions         — Security assumptions about the project
#   resolved_findings   — Previously remediated findings with evidence
#
# STRIDE categories for linked_threats:
#   Spoofing | Tampering | Repudiation |
#   Information Disclosure | Denial of Service | Elevation of Privilege
# =============================================================================


# -----------------------------------------------------------------------------
# Project metadata
# -----------------------------------------------------------------------------
project:
  name: MCP Security Scanner
  description: >
    MCP server integrating Checkov, Semgrep, Bandit, and ASH to provide
    real-time security scanning for AI coding assistants. Runs locally —
    no code leaves the developer's machine.


# -----------------------------------------------------------------------------
# Security assumptions
#
# Document what you assume to be true about the project's security posture.
# These feed directly into the SECURITY.md report and support threat modeling.
#
# Fields:
#   assumption     (required) — What is assumed to be true
#   linked_threats (optional) — STRIDE categories this assumption relates to
#   comments       (optional) — Evidence, references, or additional context
# -----------------------------------------------------------------------------
assumptions:

  - assumption: All scanning runs locally — no code is sent to external services
    linked_threats: Information Disclosure
    comments: Scanners execute in temp directories on the developer's machine

  - assumption: The MCP server runs with the same permissions as the user's IDE
    linked_threats: Elevation of Privilege
    comments: No elevated privileges required; inherits IDE process permissions

  - assumption: Scanner tools (Checkov, Semgrep, Bandit) are installed from trusted sources
    linked_threats: Tampering
    comments: Installed via pip/uvx from PyPI or official GitHub repos

  - assumption: Temporary files created during scanning are cleaned up after each scan
    linked_threats: Information Disclosure
    comments: Uses Python tempfile.TemporaryDirectory with automatic cleanup

  - assumption: Scan results may contain file paths and code snippets from the scanned project
    linked_threats: Information Disclosure
    comments: Results are returned to the MCP client (IDE) and not persisted externally

  - assumption: The MCP server does not authenticate or authorize callers
    linked_threats: Spoofing
    comments: Relies on the MCP client (IDE) to manage access; local-only by design

  # -------------------------------------------------------------------------
  # Add your own assumptions below:
  # -------------------------------------------------------------------------
  # - assumption: <What you assume to be true>
  #   linked_threats: <STRIDE category>
  #   comments: <Evidence or context>


# -----------------------------------------------------------------------------
# Resolved findings
#
# Document findings that have been remediated. These appear in the
# "Resolved Findings" section of the SECURITY.md report with evidence.
#
# Fields:
#   id       (required) — Finding ID from the scanner (e.g., B501, CKV_AWS_18)
#   tool     (required) — Scanner that found it (e.g., bandit, checkov, semgrep)
#   severity (required) — Original severity (CRITICAL, HIGH, MEDIUM, LOW)
#   action   (required) — What was done to fix it
#   before   (optional) — Code/config before the fix
#   after    (optional) — Code/config after the fix
# -----------------------------------------------------------------------------
resolved_findings:

  # -------------------------------------------------------------------------
  # Add resolved findings as you remediate them:
  # -------------------------------------------------------------------------
  # - id: B602
  #   tool: bandit
  #   severity: HIGH
  #   action: Replaced subprocess.call(cmd, shell=True) with subprocess.run(cmd_list)
  #   before: "subprocess.call(cmd, shell=True)"
  #   after: "subprocess.run(['tool', '--flag', path], check=True)"
